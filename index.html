<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Unit Converter</title>
  </head>
  <body>
    <div class="container">
      <div class="top">
        <h1>Metric/Imperial Unit Conversion</h1>
        <input type="number" class="input"></input>
        <button class="btn-convert">Convert</button>
      </div>
      <div class="bottom">
        <div class="length">
          <h2>Length (Meter | Feet)</h2>
          <div class="unit">
            <p id="meters">abcdefghij</p>
            <p id="feet">abcdefghij</p>
          </div>
        </div>
        <div class="volume">
          <h2>Volume (Liters | Gallons)</h2>
          <div class="unit">
            <p id="liters">abcdefghij</p>
            <p id="gallons">abcdefghij</p>
          </div>
        </div>
        <div class="mass">
          <h2>Mass (Kilogram | Pounds)</h2>
          <div class="unit">
            <p id="kilo">abcdefghij</p>
            <p id="pounds">abcdefghij</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
