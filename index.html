<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Unit Converter</title>
  </head>
  <body>
    <div class="container">
      <div class="top">
        <h1>Metric/Imperial Unit Conversion</h1>
          <div>
            <input type="number" class="input" id="input"></input>
          </div>
          <div class="buttons">
            <button class="btn" id="btn-convert">Convert</button>
          <button class="btn btn-reset" id="btn-reset">Reset</button>
          </div>
          
      </div>
      <div class="bottom">
        <div class="card card-length">
          <h2>Length (Meter | Feet)</h2>
          <p id="length"></p>
        </div>
        <div class="card card-volume">
          <h2>Volume (Liters | Gallons)</h2>
          <p id="volume"></p>
        </div>
        <div class="card card-mass">
          <h2>Mass (Kilogram | Pounds)</h2>
          <p id="mass"></p>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
    <footer>Made by Manel ʕ´•ᴥ•`ʔ &copy; 2026</footer>
  </body>
</html>
